name: Promote to Latest Release

on:
  schedule:
    - cron: '0 12 * * 1' # Every Monday at noon UTC
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.stable }}
      skipped: ${{ steps.version.outputs.skipped }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute stable version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")

          if [[ "$CURRENT" != *-beta* ]]; then
            echo "Current version $CURRENT is not a beta — nothing to promote"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          STABLE=$(echo "$CURRENT" | sed 's/-beta\..*//')

          if git rev-parse "v${STABLE}" >/dev/null 2>&1; then
            echo "Stable tag v${STABLE} already exists — nothing to promote"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "Promoting $CURRENT → $STABLE"

      - name: Create stable git tag
        if: steps.version.outputs.skipped == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.stable }}" \
            -m "Release ${{ steps.version.outputs.stable }}"
          git push origin "v${{ steps.version.outputs.stable }}"

      - name: Extract changelog notes
        if: steps.version.outputs.skipped == 'false'
        id: notes
        run: |
          STABLE="${{ steps.version.outputs.stable }}"

          # Extract all beta sections for this stable version from CHANGELOG.md
          # e.g. for STABLE=1.4.4, matches ## [1.4.4-beta.0], ## [1.4.4-beta.1], etc.
          NOTES=$(awk -v ver="$STABLE" '
            /^## \[/ {
              if ($0 ~ "## \\[" ver "-") {
                capture = 1
                next
              } else if (capture) {
                # Hit a different version section — stop
                exit
              }
            }
            capture { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "No changelog entries found — falling back to generated notes"
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            # Write notes to a temp file to avoid shell escaping issues
            echo "$NOTES" > /tmp/release-notes.md
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.version.outputs.skipped == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.notes.outputs.fallback }}" = "true" ]; then
            gh release create "v${{ steps.version.outputs.stable }}" \
              --title "${{ steps.version.outputs.stable }}" \
              --generate-notes \
              --latest
          else
            gh release create "v${{ steps.version.outputs.stable }}" \
              --title "${{ steps.version.outputs.stable }}" \
              --notes-file /tmp/release-notes.md \
              --latest
          fi

  docker-publish:
    needs: promote
    if: ${{ needs.promote.outputs.skipped == 'false' }}
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.promote.outputs.version }}

  cf-deploy:
    needs: promote
    if: ${{ needs.promote.outputs.skipped == 'false' }}
    uses: ./.github/workflows/deploy-cf.yml
    secrets: inherit
