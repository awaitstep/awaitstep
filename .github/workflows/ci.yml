name: Tests

on:
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: >-
      ${{ !startsWith(github.head_ref, 'chore/registry-index-') &&
          !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

  # Auto-pass for registry index and release-please PRs
  test-skip:
    if: >-
      ${{ startsWith(github.head_ref, 'chore/registry-index-') ||
          startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Skipping tests for auto-generated PR"
