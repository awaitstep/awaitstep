name: Build Registry Index

on:
  push:
    branches: [main]
    paths:
      - 'registry/nodes/**'
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build registry index
        run: pnpm --filter @awaitstep/ir build && npx tsx registry/scripts/build-index.ts && npx prettier --write registry/index.json registry/nodes/*/*/node.json

      - name: Check for changes
        id: diff
        run: |
          git add registry/index.json registry/nodes/*/*/node.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR and auto-merge
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/registry-index-$(date +%s)"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          HUSKY=0 git commit -m "chore: rebuild registry index"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore: rebuild registry index" \
            --body "Auto-generated from registry/nodes changes." \
            --base main \
            --head "$BRANCH")
          gh pr merge "$PR_URL" --merge --auto
